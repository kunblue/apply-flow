services:
  db:
    image: postgres:16-alpine
    container_name: apply-flow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apply_flow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apply_flow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: apply-flow-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/apply_flow
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: apply-flow-frontend
    restart: unless-stopped
    environment:
      # 前端服务端渲染阶段走 Docker 内网访问后端
      API_BASE_URL: http://backend:3001
      # 浏览器端请求走宿主机端口
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      PORT: 3000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
